name: Bump version

on:
  pull_request:
    types: [closed]
    branches: [main, master]

permissions:
  contents: write

jobs:
  bump:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine bump type from PR labels
        id: bump
        env:
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          labels="$(echo "$LABELS" | tr '[:upper:]' '[:lower:]')"
          if [[ ",$labels," == *",major,"* ]]; then
            type=major
          elif [[ ",$labels," == *",minor,"* ]]; then
            type=minor
          else
            type=patch
          fi
          echo "type=$type" >> "$GITHUB_OUTPUT"
          echo "Bump type: $type (labels: ${LABELS:-none})"

      - name: Bump package.json version
        id: version
        run: |
          current="$(node -p "require('./package.json').version")"
          IFS=. read -r major minor patch <<< "$current"

          case "${{ steps.bump.outputs.type }}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          new="${major}.${minor}.${patch}"
          npm version "$new" --no-git-tag-version --allow-same-version=false

          echo "old=$current" >> "$GITHUB_OUTPUT"
          echo "new=$new" >> "$GITHUB_OUTPUT"
          echo "Version: $current → $new"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add package.json package-lock.json
          if git diff --cached --quiet; then
            echo "No version changes to commit"
            exit 0
          fi

          git commit -m "chore: bump version to ${{ steps.version.outputs.new }}"
          git push origin "HEAD:${{ github.event.pull_request.base.ref }}"
